services:
  - type: web
    name: controle-financeiro
    env: node
    buildCommand: pnpm build
    startCommand: pnpm migrate && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 3000
